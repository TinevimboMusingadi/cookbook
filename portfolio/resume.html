<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume | Tinevimbo Musingadi</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  <style>
    .resume-container {
      max-width: 800px;
      margin: 0 auto;
      padding-bottom: var(--space-20);
    }
    .resume-header {
      margin-bottom: var(--space-12);
      border-bottom: 2px solid var(--ghost-border);
      padding-bottom: var(--space-6);
    }
    .resume-section {
      margin-bottom: var(--space-12);
    }
    .resume-section-title {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: var(--space-6);
      font-family: var(--font-mono);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .resume-item {
      margin-bottom: var(--space-6);
    }
    .resume-item-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.5rem;
    }
    .resume-item-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-main);
    }
    .resume-item-date {
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--text-variant);
    }
    .resume-item-org {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    .resume-list {
      list-style-type: none;
      padding-left: 0;
    }
    .resume-list li {
      position: relative;
      padding-left: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--text-variant);
    }
    .resume-list li::before {
      content: '▹';
      position: absolute;
      left: 0;
      color: var(--primary);
      font-family: var(--font-mono);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container">
      <a href="index.html" class="logo">T.MUSINGADI</a>
      <div class="nav-links">
        <a href="index.html#about" class="nav-link">About</a>
        <a href="projects.html" class="nav-link">Projects & Research</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <a href="resume.html" class="nav-link" style="color: var(--text-main);">Resume</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <button id="theme-toggle" class="btn btn-ghost" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">Light Mode</button>
      </div>
    </div>
  </nav>

  <main class="resume-container" style="max-width: 1000px; padding-top: 100px;">
    <div class="page-header" style="text-align: center; border-bottom: none; padding-bottom: 2rem;">
      <h1 class="page-title">Curriculum Vitae</h1>
      <p style="font-size: 1.125rem; margin-bottom: 1.5rem;">Tinevimbo Musingadi | AI Engineer & InfoSec Researcher</p>
      
      <div style="margin-top: 1rem;">
        <a href="assets/tine_september.pdf" download class="btn btn-primary">Download PDF</a>
      </div>
    </div>

    <!-- PDF Embed -->
    <section class="resume-section" style="height: 100vh; margin-top: 2rem;">
      <object data="assets/tine_september.pdf" type="application/pdf" width="100%" height="100%" style="border-radius: var(--radius-md); box-shadow: 0 10px 40px var(--primary-glow); border: 1px solid var(--ghost-border);">
        <div style="text-align: center; padding: 3rem; background: var(--surface-low); border-radius: var(--radius-md);">
          <p style="margin-bottom: 1rem;">Your browser does not support rendering PDFs inline or the PDF file is missing.</p>
          <a href="assets/tine_september.pdf" class="btn btn-primary" download>Click here to download the PDF</a>
          <p style="margin-top: 2rem; color: var(--text-variant); font-size: 0.875rem;">
            (Developer Note: Please compile `tine_september.tex` to PDF and place it in the `assets/` folder as `tine_september.pdf`)
          </p>
        </div>
      </object>
    </section>
  </main>
  
  <script src="js/main.js"></script>
</body>
</html>
