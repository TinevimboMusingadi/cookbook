<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Tinevimbo Musingadi</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .contact-container {
      max-width: 600px;
      margin: 0 auto;
      padding: var(--space-20) 2rem;
    }
    
    .contact-form {
      background: var(--surface-low);
      padding: var(--space-12);
      border-radius: var(--radius-lg);
      border: 1px solid var(--ghost-border);
    }
    
    .form-group {
      margin-bottom: var(--space-6);
    }
    
    .form-label {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      color: var(--text-variant);
      margin-bottom: 0.5rem;
      letter-spacing: 0.05em;
    }
    
    .form-input, .form-textarea {
      width: 100%;
      background: var(--surface-highest);
      border: 1px solid transparent;
      padding: 1rem;
      border-radius: var(--radius-md);
      color: var(--text-main);
      font-family: var(--font-body);
      transition: all 0.3s ease;
    }
    
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 15px var(--primary-glow);
    }
    
    .form-textarea {
      min-height: 150px;
      resize: vertical;
    }
    
    /* HTML5 Validation styling */
    .form-input:user-invalid, .form-textarea:user-invalid {
      border-color: #ef4444;
    }

    .social-links {
      display: flex;
      gap: 1.5rem;
      margin-top: var(--space-6);
      justify-content: center;
    }
    
    .social-link {
      font-family: var(--font-mono);
      color: var(--text-variant);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: color 0.3s ease;
    }
    
    .social-link:hover {
      color: var(--primary);
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container">
      <a href="index.html" class="logo">T.MUSINGADI</a>
      <div class="nav-links">
        <a href="index.html#about" class="nav-link">About</a>
        <a href="projects.html" class="nav-link">Projects & Research</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <a href="resume.html" class="nav-link">Resume</a>
        <a href="contact.html" class="nav-link" style="color: var(--text-main);">Contact</a>
        <button id="theme-toggle" class="btn btn-ghost" style="padding: 0.25rem 0.75rem; font-size: 0.75rem;">Light Mode</button>
      </div>
    </div>
  </nav>

  <main class="contact-container">
    <div class="page-header" style="text-align: center; border-bottom: none; padding-bottom: 2rem;">
      <h1 class="page-title">Initialize Link</h1>
      <p style="font-size: 1.125rem;">Establish an asynchronous connection channel.</p>
    </div>

    <!-- Contact Form with HTML5 Validation -->
    <form class="contact-form" action="#" method="POST" onsubmit="alert('Message sequence initialized. (Demo only)'); return false;">
      <div class="form-group">
        <label for="name" class="form-label">IDENTIFIER (NAME)</label>
        <input type="text" id="name" name="name" class="form-input" required minlength="2" placeholder="e.g. Satoshi Nakamoto">
      </div>
      
      <div class="form-group">
        <label for="email" class="form-label">RETURN ADDRESS (EMAIL)</label>
        <input type="email" id="email" name="email" class="form-input" required placeholder="e.g. satoshi@bitcoin.org">
      </div>
      
      <div class="form-group">
        <label for="message" class="form-label">PAYLOAD (MESSAGE)</label>
        <textarea id="message" name="message" class="form-textarea" required minlength="10" placeholder="Encrypt your thoughts here..."></textarea>
      </div>
      
      <button type="submit" class="btn btn-primary" style="width: 100%;">Transmit Payload</button>
    </form>

    <div class="social-links">
      <a href="https://github.com/TinevimboMusingadi" target="_blank" class="social-link">GitHub</a>
      <a href="https://x.com/TMusingadi" target="_blank" class="social-link">X (Twitter)</a>
      <a href="mailto:tmusingadi@hit.ac.zw" class="social-link">Email</a>
    </div>

  </main>
  
  <script src="js/main.js"></script>
</body>
</html>
